# ──────────────────────────────────────────────────────────────
# Docker Compose — Full-Stack Complaint Portal
#
# Usage (local development):
#   docker-compose up --build
#
# Usage (production):
#   docker-compose -f docker-compose.yml up -d
# ──────────────────────────────────────────────────────────────

version: "3.8"

services:
  # ── Backend + Frontend (single container) ──
  app_blue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: app_blue
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - DATABASE_URL=${DATABASE_URL}
      - SESSION_SECRET=${SESSION_SECRET}
      - SMTP_HOST=${SMTP_HOST:-smtp.gmail.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_FROM=${SMTP_FROM}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Green slot (for blue-green deployment) ──
  app_green:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: app_green
    restart: unless-stopped
    ports:
      - "5001:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - DATABASE_URL=${DATABASE_URL}
      - SESSION_SECRET=${SESSION_SECRET}
      - SMTP_HOST=${SMTP_HOST:-smtp.gmail.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_FROM=${SMTP_FROM}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    profiles:
      - blue-green  # Only started during blue-green deployments

  # ── Nginx reverse proxy ──
  nginx:
    image: nginx:1.25-alpine
    container_name: nginx_proxy
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/complaint-portal.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app_blue
