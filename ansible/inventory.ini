# ──────────────────────────────────────────────────────────────
# Ansible Inventory — Remote Server(s)
# Replace YOUR_SERVER_IP with your actual Ubuntu VM IP
# (Oracle Cloud free tier, AWS, DigitalOcean, etc.)
# ──────────────────────────────────────────────────────────────

[webservers]
production ansible_host=YOUR_SERVER_IP ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/id_rsa ansible_ssh_common_args='-o StrictHostKeyChecking=no'

[webservers:vars]
ansible_python_interpreter=/usr/bin/python3
docker_image=YOUR_DOCKERHUB_USERNAME/complaint-portal
docker_tag=latest
