---
# ──────────────────────────────────────────────────────────────
# Ansible Playbook — Full Server Setup + Docker Deployment
# Installs Docker, pulls the latest image, runs the container
# with blue-green logic, and configures Nginx as reverse proxy.
#
# Usage:
#   ansible-playbook -i ansible/inventory.ini ansible/playbook.yml \
#     -e "database_url=postgresql://... session_secret=your-secret"
# ──────────────────────────────────────────────────────────────

- name: Setup and Deploy Complaint Portal
  hosts: webservers
  become: yes

  vars:
    docker_image: "{{ docker_image | default('YOUR_DOCKERHUB_USERNAME/complaint-portal') }}"
    docker_tag: "{{ docker_tag | default('latest') }}"
    database_url: "{{ database_url }}"
    session_secret: "{{ session_secret }}"

  tasks:
    # ── 1. Install Docker ──
    - name: Install required system packages
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
          - python3-pip
        state: present
        update_cache: yes

    - name: Add Docker GPG key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Add Docker repository
      apt_repository:
        repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present

    - name: Install Docker CE
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
        state: present
        update_cache: yes

    - name: Start and enable Docker
      systemd:
        name: docker
        state: started
        enabled: yes

    - name: Add ubuntu user to docker group
      user:
        name: ubuntu
        groups: docker
        append: yes

    - name: Install Docker Python SDK (for Ansible docker modules)
      pip:
        name: docker
        state: present

    # ── 2. Install Nginx ──
    - name: Install Nginx
      apt:
        name: nginx
        state: present

    - name: Deploy Nginx reverse-proxy config
      copy:
        src: ../nginx/complaint-portal.conf
        dest: /etc/nginx/conf.d/complaint-portal.conf
        owner: root
        group: root
        mode: "0644"
      notify: Reload Nginx

    - name: Remove default Nginx site
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent
      notify: Reload Nginx

    # ── 3. Pull latest Docker image ──
    - name: Pull latest Docker image
      docker_image:
        name: "{{ docker_image }}:{{ docker_tag }}"
        source: pull
        force_source: yes

    # ── 4. Determine active slot (blue-green) ──
    - name: Check if app_blue is running
      command: docker inspect --format '{{ "{{" }}.State.Running{{ "}}" }}' app_blue
      register: blue_running
      ignore_errors: yes
      changed_when: false

    - name: Set deployment slot
      set_fact:
        new_slot: "{{ 'app_green' if (blue_running.stdout | default('false')) == 'true' else 'app_blue' }}"
        new_port: "{{ '5001' if (blue_running.stdout | default('false')) == 'true' else '5000' }}"
        old_slot: "{{ 'app_blue' if (blue_running.stdout | default('false')) == 'true' else 'app_green' }}"

    - name: Display deployment info
      debug:
        msg: "Deploying to {{ new_slot }} on port {{ new_port }}"

    # ── 5. Stop new slot container (if leftover from previous deploy) ──
    - name: Stop new slot container if exists
      docker_container:
        name: "{{ new_slot }}"
        state: absent
      ignore_errors: yes

    # ── 6. Start new container ──
    - name: Start new container
      docker_container:
        name: "{{ new_slot }}"
        image: "{{ docker_image }}:{{ docker_tag }}"
        state: started
        restart_policy: unless-stopped
        ports:
          - "{{ new_port }}:5000"
        env:
          DATABASE_URL: "{{ database_url }}"
          SESSION_SECRET: "{{ session_secret }}"
          NODE_ENV: "production"
          PORT: "5000"

    # ── 7. Wait for health check ──
    - name: Wait for new container health check
      uri:
        url: "http://localhost:{{ new_port }}/api/health"
        status_code: 200
      register: health_check
      retries: 10
      delay: 3
      until: health_check.status == 200

    # ── 8. Switch Nginx to new slot ──
    - name: Update Nginx upstream to new port
      lineinfile:
        path: /etc/nginx/conf.d/complaint-portal.conf
        regexp: "proxy_pass http://localhost:"
        line: "        proxy_pass http://localhost:{{ new_port }};"
      notify: Reload Nginx

    # ── 9. Stop old container ──
    - name: Stop old container
      docker_container:
        name: "{{ old_slot }}"
        state: absent
      ignore_errors: yes

    # ── 10. Clean up old Docker images ──
    - name: Prune unused Docker images
      command: docker image prune -af --filter "until=72h"
      changed_when: false

    - name: Deployment complete
      debug:
        msg: "✅ Deployment complete! {{ new_slot }} is live on port {{ new_port }}"

  handlers:
    - name: Reload Nginx
      systemd:
        name: nginx
        state: reloaded
