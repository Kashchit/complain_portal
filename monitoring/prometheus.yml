# ──────────────────────────────────────────────────────────────
# Prometheus Configuration
# Scrapes the complaint-portal /api/health endpoint
# and its own metrics for self-monitoring.
# ──────────────────────────────────────────────────────────────

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # Complaint Portal backend (Render)
  - job_name: "complaint-portal"
    metrics_path: "/api/health"
    scheme: "https"
    scrape_interval: 15s
    static_configs:
      - targets: ["complain-portal-api.onrender.com:443"]
        labels:
          app: "complaint-portal"
          env: "production"

  # Node Exporter (optional — host-level metrics)
  # Uncomment if you install node_exporter on the server
  # - job_name: "node-exporter"
  #   static_configs:
  #     - targets: ["host.docker.internal:9100"]
