# ──────────────────────────────────────────────────────────────
# Nginx Reverse Proxy — Blue-Green Deployment
#
# Routes all traffic to the currently active container slot.
# The "proxy_pass" line is updated automatically by Ansible
# or the CI/CD deploy script to switch between:
#   - app_blue  → localhost:5000
#   - app_green → localhost:5001
# ──────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name _;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 256;

    # Request size limit (matches Express body-parser limit)
    client_max_body_size 5M;

    # Main application — proxied to active Docker container
    location / {
        proxy_pass http://localhost:5000;
        proxy_http_version 1.1;

        # WebSocket / SSE support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Forward real client info
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Health check endpoint (used by monitoring)
    location /api/health {
        proxy_pass http://localhost:5000;
        proxy_set_header Host $host;
        access_log off;
    }
}
