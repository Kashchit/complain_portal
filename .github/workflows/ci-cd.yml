# ──────────────────────────────────────────────────────────────
# CI/CD Pipeline — GitHub Actions
# Triggers on push to main branch
#
# Pipeline: Checkout → Install → Test → Security Scan →
#           Docker Build → Push to Docker Hub →
#           Deploy to Remote Server via SSH
# ──────────────────────────────────────────────────────────────

name: CI/CD Pipeline — DevSecOps

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/complaint-portal
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # ────────────────────────────────────────────────────────────
  # JOB 1: Build, Test, Security Scan
  # ────────────────────────────────────────────────────────────
  build-and-scan:
    name: Build, Test & Security Scan
    runs-on: ubuntu-latest

    steps:
      # ── Step 1: Checkout source code ──
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Step 2: Setup Node.js ──
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      # ── Step 3: Install backend dependencies ──
      - name: Install backend dependencies
        run: npm ci

      # ── Step 4: Install frontend dependencies ──
      - name: Install frontend dependencies
        run: cd client && npm ci

      # ── Step 5: Build frontend ──
      - name: Build frontend
        run: cd client && npm run build

      # ── Step 6: Run tests (skip gracefully if none exist) ──
      - name: Run tests
        run: |
          if npm test --if-present 2>/dev/null; then
            echo "✅ Tests passed"
          else
            echo "⚠️  No test script found — skipping"
          fi
        continue-on-error: true

      # ── Step 7: Build Docker image ──
      - name: Build Docker image
        run: |
          docker build \
            -t ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} \
            -t ${{ env.IMAGE_NAME }}:latest \
            -f Dockerfile .

      # ── Step 8: Security scan with Trivy ──
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}"
          format: "table"
          exit-code: "0"
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "CRITICAL,HIGH"
          output: "trivy-report.txt"

      # ── Step 9: Upload Trivy report ──
      - name: Upload Trivy scan report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-security-report
          path: trivy-report.txt
          retention-days: 30

      # ── Step 10 (OPTIONAL): OWASP ZAP Baseline Scan ──
      # Uncomment the block below to enable ZAP scanning.
      # Requires the app to be running; best used in staging.
      # - name: OWASP ZAP Baseline Scan
      #   uses: zaproxy/action-baseline@v0.10.0
      #   with:
      #     target: "http://localhost:5000"
      #     rules_file_name: ".zap/rules.tsv"
      #     cmd_options: "-a"
      #   continue-on-error: true

      # ── Step 11: Login to Docker Hub ──
      - name: Login to Docker Hub
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ── Step 12: Push Docker image to Docker Hub ──
      - name: Push Docker image
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          docker push ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          docker push ${{ env.IMAGE_NAME }}:latest
          echo "✅ Image pushed: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}"

  # ────────────────────────────────────────────────────────────
  # JOB 2: Deploy to Remote Server
  # ────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Production Server
    runs-on: ubuntu-latest
    needs: build-and-scan
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            echo "═══════════════════════════════════════"
            echo "  🚀 Deploying complaint-portal"
            echo "═══════════════════════════════════════"

            # Pull the latest image
            docker pull ${{ env.IMAGE_NAME }}:latest

            # Determine which slot is active (blue-green)
            ACTIVE=$(docker inspect --format='{{.Name}}' $(docker ps -q --filter "name=app_") 2>/dev/null | head -1 | tr -d '/')

            if [ "$ACTIVE" = "app_blue" ]; then
              NEW_SLOT="app_green"
              NEW_PORT="5001"
              OLD_SLOT="app_blue"
            else
              NEW_SLOT="app_blue"
              NEW_PORT="5000"
              OLD_SLOT="app_green"
            fi

            echo "→ Active: ${ACTIVE:-none}, deploying to: $NEW_SLOT (port $NEW_PORT)"

            # Stop the NEW slot container if it exists from a previous deploy
            docker stop $NEW_SLOT 2>/dev/null || true
            docker rm $NEW_SLOT 2>/dev/null || true

            # Start the new container
            docker run -d \
              --name $NEW_SLOT \
              --restart unless-stopped \
              -p $NEW_PORT:5000 \
              -e DATABASE_URL="${{ secrets.DATABASE_URL }}" \
              -e SESSION_SECRET="${{ secrets.SESSION_SECRET }}" \
              -e NODE_ENV=production \
              -e PORT=5000 \
              ${{ env.IMAGE_NAME }}:latest

            # Wait for health check
            echo "⏳ Waiting for $NEW_SLOT health check..."
            for i in $(seq 1 10); do
              if curl -sf http://localhost:$NEW_PORT/api/health > /dev/null 2>&1; then
                echo "✅ $NEW_SLOT is healthy!"
                break
              fi
              if [ $i -eq 10 ]; then
                echo "❌ Health check failed — rolling back"
                docker stop $NEW_SLOT 2>/dev/null || true
                docker rm $NEW_SLOT 2>/dev/null || true
                exit 1
              fi
              sleep 3
            done

            # Switch Nginx upstream to the new slot
            sudo sed -i "s/localhost:[0-9]*/localhost:$NEW_PORT/" /etc/nginx/conf.d/complaint-portal.conf
            sudo nginx -t && sudo systemctl reload nginx

            # Stop the old container
            if [ -n "$ACTIVE" ] && [ "$ACTIVE" != "$NEW_SLOT" ]; then
              echo "🛑 Stopping old container: $OLD_SLOT"
              docker stop $OLD_SLOT 2>/dev/null || true
              docker rm $OLD_SLOT 2>/dev/null || true
            fi

            # Prune old images
            docker image prune -af --filter "until=72h"

            echo "═══════════════════════════════════════"
            echo "  ✅ Deployment complete: $NEW_SLOT"
            echo "═══════════════════════════════════════"
